<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Wizard 🧙‍♂️ - Super Worksheets</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   WORKSHEET THEME - ENGLISH/WORDS
══════════════════════════════════════════ */
:root {
  --primary: #a855f7; /* Purple */
  --secondary: #ec4899; /* Pink */
  --danger: #ef4444; 
  --warning: #fbbf24; 
  --blue: #3b82f6;
  --dark: #1e293b; 
  --paper: #ffffff;
  --grid: #f3e8ff; /* Light purple grid */
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background-color: #faf5ff;
  background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 30px 30px; color: var(--dark);
  min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
}

.home-btn {
  position: absolute; top: 20px; left: 20px; background: white; border: 3px solid var(--primary);
  color: var(--primary); padding: 8px 16px; border-radius: 50px; text-decoration: none;
  font-family: 'Fredoka One', cursive; font-size: 1.1rem; box-shadow: 0 4px 0 var(--primary); z-index: 100;
}
.home-btn:active { transform: translateY(4px); box-shadow: 0 0 0 var(--primary); }

header { text-align: center; margin-top: 40px; margin-bottom: 20px; }
h1 { font-family: 'Fredoka One', cursive; font-size: 3.2rem; color: var(--primary); text-shadow: 2px 2px 0 #fff; line-height: 1; }
.subtitle { font-size: 1.2rem; font-weight: 800; color: #64748b; margin-top: 5px; }

.screen { display: none; width: 100%; max-width: 600px; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.screen.active { display: block; }
@keyframes popIn { 0% { opacity: 0; transform: scale(0.9) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

.worksheet-card { background: var(--paper); border: 4px solid var(--dark); border-radius: 24px; padding: 30px; box-shadow: 0 10px 0 rgba(51, 65, 85, 0.1); text-align: center; position: relative; }

/* MINI BADGE BOARD */
.mini-badge-board { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; background: #f8fafc; border: 3px dashed #cbd5e1; border-radius: 16px; padding: 15px; }
.badge-board-title { width: 100%; font-family: 'Fredoka One'; font-size: 1.1rem; color: #94a3b8; margin-bottom: 5px; }
.mini-badge { font-size: 2.2rem; transition: all 0.3s ease; }
.mini-badge.unlocked { filter: drop-shadow(0 4px 4px rgba(0,0,0,0.15)); animation: popIn 0.3s ease; }
.mini-badge.locked { filter: grayscale(100%) contrast(0.2); opacity: 0.3; }

/* Category Grid */
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
.cat-btn {
  background: white; border: 4px solid var(--dark); border-radius: 16px; padding: 15px 10px;
  cursor: pointer; font-family: 'Fredoka One', cursive; font-size: 1.2rem; color: var(--dark);
  box-shadow: 0 6px 0 var(--dark); transition: all 0.1s; display: flex; flex-direction: column; align-items: center; gap: 5px;
}
.cat-btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--dark); }
.cat-icon { font-size: 2.5rem; }

/* Modes */
.mode-btn { width: 100%; display: flex; align-items: center; gap: 15px; background: white; border: 4px solid var(--dark); border-radius: 20px; padding: 15px 20px; margin-bottom: 15px; cursor: pointer; text-align: left; box-shadow: 0 6px 0 var(--dark); }
.mode-btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--dark); }

/* Game Area */
.top-bar { display: flex; justify-content: space-between; align-items: center; font-family: 'Fredoka One', cursive; font-size: 1.5rem; margin-bottom: 15px; color: var(--dark); }

.timer-container { width: 100%; height: 20px; background: #e2e8f0; border-radius: 20px; border: 3px solid var(--dark); overflow: hidden; margin-bottom: 20px; position: relative; }
.timer-fill { height: 100%; background: var(--primary); width: 100%; transition: width 0.3s linear, background-color 0.3s; }
.time-plus { position: absolute; right: 10px; top: -5px; color: var(--primary); font-weight: 900; font-size: 1.2rem; opacity: 0; }
.time-plus.show { animation: floatUpFade 1s ease-out forwards; }

/* Dynamic Problem Layout */
.word-problem { font-family: 'Fredoka One', cursive; font-size: 2.5rem; line-height: 1.3; margin-bottom: 20px; color: var(--dark); }
.hint-text { font-family: 'Nunito', sans-serif; font-size: 1.2rem; color: var(--secondary); font-weight: 800; margin-bottom: 10px; }

/* Options Grid */
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.opt-btn { font-family: 'Fredoka One', cursive; font-size: 1.6rem; background: white; border: 4px solid var(--dark); color: var(--dark); border-radius: 16px; padding: 15px 5px; cursor: pointer; box-shadow: 0 6px 0 var(--dark); transition: all 0.1s; }
.opt-btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--dark); }
.opt-btn.correct { background: var(--secondary); color: white; border-color: var(--secondary); box-shadow: 0 6px 0 #be185d; }
.opt-btn.wrong { background: var(--danger); color: white; border-color: var(--danger); box-shadow: 0 6px 0 #e11d48; }

.btn-primary { width: 100%; font-family: 'Fredoka One', cursive; font-size: 1.5rem; background: var(--primary); color: white; border: 4px solid #7e22ce; border-radius: 16px; padding: 15px; cursor: pointer; box-shadow: 0 6px 0 #7e22ce; }
.btn-primary:active { transform: translateY(6px); box-shadow: 0 0 0 #7e22ce; }

.feedback-star { position: absolute; font-size: 4rem; opacity: 0; pointer-events: none; z-index: 10; }
.feedback-star.pop { animation: starPop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
@keyframes starPop { 0% { opacity: 1; transform: scale(0.5) rotate(-20deg); } 50% { transform: scale(1.2) rotate(10deg); } 100% { opacity: 0; transform: scale(1) translateY(-30px); } }

/* ══════════════════════════════════════════
   TEST SHEET STYLES
══════════════════════════════════════════ */
.test-header { display: flex; justify-content: space-between; font-family: 'Fredoka One'; font-size: 1.3rem; border-bottom: 3px dashed #cbd5e1; padding-bottom: 15px; margin-bottom: 20px; }
.q-row { display: flex; align-items: center; justify-content: space-between; font-size: 1.3rem; font-family: 'Fredoka One'; padding: 15px 0; border-bottom: 2px solid #f1f5f9; text-align: left; }
.q-word { display: flex; align-items: center; gap: 10px; width: 65%; line-height: 1.2; }
.q-input-wrap { position: relative; width: 30%; display: flex; flex-direction: column; align-items: center; gap: 5px; }
.q-input { width: 100%; font-family: 'Fredoka One'; font-size: 1.1rem; padding: 8px; border: 3px solid var(--dark); border-radius: 12px; text-align: center; outline: none; background: white; cursor: pointer; }
.q-input:focus { border-color: var(--primary); }

.q-row.correct .q-input { background: #d1fae5; border-color: #10b981; color: #10b981; }
.q-row.wrong .q-input { background: #fee2e2; border-color: var(--danger); color: var(--danger); }
.correction { font-size: 1rem; color: #10b981; display: none; font-weight: 800; }
.q-row.wrong .correction { display: block; animation: popIn 0.3s; }

.sticker-alert { background: #fef08a; border: 4px solid #ca8a04; border-radius: 16px; padding: 15px; margin-top: 20px; display: none; animation: popIn 0.5s ease; }
.sticker-alert.show { display: block; }

@media(max-width: 500px) {
  .cat-grid { grid-template-columns: 1fr; }
  .opt-btn { font-size: 1.2rem; }
  .q-row { flex-direction: column; align-items: flex-start; gap: 10px; }
  .q-word { width: 100%; }
  .q-input-wrap { width: 100%; }
}
</style>
</head>
<body>

<a href="index.html" class="home-btn">🏠 Home</a>

<header>
  <h1>Word Wizard</h1>
  <div class="subtitle">Spelling & Grammar ✍️</div>
</header>

<div id="categoryScreen" class="screen active">
  <div class="worksheet-card">
    
    <div class="mini-badge-board" id="miniBadgeBoard">
      <div class="badge-board-title">Collect all 12 Badges! 🏆</div>
      </div>

    <h2 style="font-family:'Fredoka One'; font-size: 1.8rem; color: var(--dark);">What are we learning today?</h2>
    <div class="cat-grid">
      <button class="cat-btn" style="border-color: var(--primary); color: var(--primary);" onclick="selectCategory('spelling')">
        <span class="cat-icon">📝</span> Spelling
      </button>
      <button class="cat-btn" style="border-color: var(--secondary); color: var(--secondary);" onclick="selectCategory('phonics')">
        <span class="cat-icon">🗣️</span> Phonics
      </button>
      <button class="cat-btn" style="border-color: var(--blue); color: var(--blue);" onclick="selectCategory('grammar')">
        <span class="cat-icon">🧩</span> Grammar
      </button>
      <button class="cat-btn" style="border-color: var(--warning); color: #d97706;" onclick="selectCategory('sentences')">
        <span class="cat-icon">✍️</span> Sentences
      </button>
    </div>
  </div>
</div>

<div id="modeScreen" class="screen">
  <div class="worksheet-card">
    <button style="background:none; border:none; color:#64748b; font-weight:bold; cursor:pointer; margin-bottom:15px; text-decoration:underline;" onclick="switchScreen('categoryScreen')">🔙 Back to Topics</button>
    <h2 style="font-family:'Fredoka One'; font-size: 1.8rem; margin-bottom: 20px; color: var(--dark);">Choose Your Mode</h2>
    
    <button class="mode-btn" style="border-color: var(--primary); box-shadow: 0 6px 0 var(--primary);" onclick="startGame('relaxed')">
      <div class="mode-icon">🌟</div>
      <div>
        <h3 style="font-family:'Fredoka One'; font-size: 1.4rem; color: var(--dark);">Practice Mode</h3>
        <p style="font-weight: 600; color: #64748b;">No timer! Take your time to read.</p>
      </div>
    </button>

    <button class="mode-btn" style="border-color: var(--warning); box-shadow: 0 6px 0 var(--warning);" onclick="startGame('blast')">
      <div class="mode-icon">🚀</div>
      <div>
        <h3 style="font-family:'Fredoka One'; font-size: 1.4rem; color: var(--dark);">Blast Mode</h3>
        <p style="font-weight: 600; color: #64748b;">Survival! Get +5s for correct answers.</p>
      </div>
    </button>

    <button class="mode-btn" style="border-color: var(--blue); box-shadow: 0 6px 0 var(--blue);" onclick="startGame('test')">
      <div class="mode-icon">📝</div>
      <div>
        <h3 style="font-family:'Fredoka One'; font-size: 1.4rem; color: var(--dark);">Test Mode</h3>
        <p style="font-weight: 600; color: #64748b;">10 Questions. Grade at the end!</p>
      </div>
    </button>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div class="worksheet-card" style="position:relative;">
    <div class="feedback-star" id="fStar">⭐</div>
    <div class="top-bar">
      <div>Score: <span id="scoreDisplay">0</span></div>
      <div id="modeDisplay" style="color: var(--warning);">🌟 Practice</div>
    </div>
    
    <div class="timer-container" id="timerBarWrap">
      <div class="timer-fill" id="timerFill"></div>
      <div class="time-plus" id="timePlus">+5s</div>
    </div>

    <div id="problemArea" class="word-problem"></div>
    <div class="options-grid" id="optionsContainer"></div>
  </div>
</div>

<div id="testScreen" class="screen">
  <div class="worksheet-card" style="padding: 20px;">
    <button style="background:none; border:none; color:#64748b; font-weight:bold; cursor:pointer; margin-bottom:15px; text-decoration:underline;" onclick="switchScreen('modeScreen')">🔙 Quit Test</button>
    
    <div class="test-header">
      <span id="testTitle">English Test</span>
      <span>Name: Vedh</span>
    </div>
    
    <div id="testQuestionsContainer"></div>

    <button class="btn-primary" id="submitTestBtn" style="margin-top: 30px;" onclick="gradeTest()">Submit Test 📋</button>

    <div id="testResultArea" style="display:none; margin-top:30px;">
      <h2 style="font-family:'Fredoka One'; font-size: 2.5rem;">Score: <span id="testScoreDisplay" style="color:var(--primary);">0/10</span></h2>
      <p id="testResultMsg" style="font-weight: 800; font-size: 1.2rem; color: #64748b; margin-bottom: 20px;">Review your answers above!</p>
      
      <div id="testStickerAlert" class="sticker-alert">
        <h3 style="font-family:'Fredoka One'; color:#ca8a04; margin-bottom:5px;">🎉 NEW BADGE UNLOCKED!</h3>
        <div id="testUnlockedEmoji" style="font-size: 4rem;"></div>
      </div>

      <button class="btn-primary" style="margin-top:20px;" onclick="switchScreen('categoryScreen')">Back to Menu</button>
    </div>
  </div>
</div>

<div id="endScreen" class="screen">
  <div class="worksheet-card">
    <h2 style="font-family:'Fredoka One'; font-size: 2.5rem; color: var(--dark);">Time's Up!</h2>
    <div style="font-size: 5rem; margin: 10px 0; color: var(--secondary); font-family: 'Fredoka One'; line-height: 1;" id="finalScore">0</div>
    <div style="font-size: 1.2rem; font-weight: 800; color: #64748b; margin-bottom: 25px;" id="endMessage">Great effort!</div>
    
    <div id="gameStickerAlert" class="sticker-alert">
      <h3 style="font-family:'Fredoka One'; color:#ca8a04; margin-bottom:5px;">🎉 NEW BADGE UNLOCKED!</h3>
      <div id="gameUnlockedEmoji" style="font-size: 4rem;"></div>
    </div>

    <button class="btn-primary" style="margin-top:20px;" onclick="switchScreen('categoryScreen')">Back to Menu 📚</button>
  </div>
</div>

<script src="sounds.js"></script>

<script>
// --- STICKER / BADGE LOGIC (WORD WIZARD THEME!) ---
const WORD_STICKERS = ['📚', '✍️', '🦉', '🎓', '🏅', '🥇', '🌟', '🎨', '🎭', '🎪', '🏰', '👑'];

function getUnlockedStickers() {
  return parseInt(localStorage.getItem('vedhWordStickers')) || 0;
}

function unlockSticker() {
  let currentUnlocked = getUnlockedStickers();
  if (currentUnlocked < WORD_STICKERS.length) {
    localStorage.setItem('vedhWordStickers', currentUnlocked + 1);
    if(typeof playSound === 'function') playSound('win');
    return WORD_STICKERS[currentUnlocked];
  }
  return null; 
}

function refreshTopBadges() {
  const container = document.getElementById('miniBadgeBoard');
  container.innerHTML = '<div class="badge-board-title">Collect all 12 Badges! 🏆</div>';
  
  let unlockedCount = getUnlockedStickers();
  
  WORD_STICKERS.forEach((sticker, i) => {
    let badge = document.createElement('div');
    badge.innerText = sticker;
    
    if (i < unlockedCount) {
      badge.className = 'mini-badge unlocked';
    } else {
      badge.className = 'mini-badge locked';
    }
    container.appendChild(badge);
  });
}


// --- MASSIVE ENGLISH DICTIONARY ---
const WORD_DATA = {
  spelling: [
    { q: "C _ T (Meow)", a: "A", opts: ["A", "E", "I", "O"] },
    { q: "D _ G (Bark)", a: "O", opts: ["O", "A", "U", "E"] },
    { q: "S _ N (Hot)", a: "U", opts: ["U", "I", "A", "E"] },
    { q: "B _ G (Insect)", a: "U", opts: ["U", "A", "O", "I"] },
    { q: "F _ SH (Swims)", a: "I", opts: ["I", "E", "A", "O"] },
    { q: "T R _ E (Leaves)", a: "E", opts: ["E", "A", "O", "I"] },
    { q: "A P P L _ (Fruit)", a: "E", opts: ["E", "A", "O", "Y"] },
    { q: "H _ U S E (Home)", a: "O", opts: ["O", "A", "E", "U"] },
    { q: "H A P P _ (Smile)", a: "Y", opts: ["Y", "E", "I", "A"] },
    { q: "B _ R D (Flies)", a: "I", opts: ["I", "E", "U", "A"] }
  ],
  phonics: [
    { q: "Which word starts with 'CH'?", a: "Chair", opts: ["Chair", "Shoe", "Tree", "Boat"] },
    { q: "Which word starts with 'SH'?", a: "Shark", opts: ["Shark", "Cheese", "Phone", "Train"] },
    { q: "Which word starts with 'TH'?", a: "Thumb", opts: ["Thumb", "Sock", "Chair", "Ring"] },
    { q: "Which word ends with 'ING'?", a: "Running", opts: ["Running", "Jumped", "Walks", "Play"] },
    { q: "Which word rhymes with CAT?", a: "Hat", opts: ["Hat", "Dog", "Car", "Sun"] },
    { q: "Which word rhymes with TREE?", a: "Bee", opts: ["Bee", "Cow", "Star", "Moon"] }
  ],
  grammar: [
    { q: "Which one is a Noun (A Thing)?", a: "Apple", opts: ["Apple", "Run", "Quickly", "Blue"] },
    { q: "Which one is a Verb (Action)?", a: "Jump", opts: ["Jump", "Table", "Happy", "Dog"] },
    { q: "Which one is an Adjective (Describing)?", a: "Tall", opts: ["Tall", "Car", "Eat", "Boy"] },
    { q: "What goes at the end of a sentence?", a: "Full Stop (.)", opts: ["Full Stop (.)", "Comma (,)", "Capital Letter", "Space"] },
    { q: "Which word needs a Capital Letter?", a: "London", opts: ["London", "house", "tree", "dog"] }
  ],
  sentences: [
    { q: "The dog ___ over the fence.", a: "jumped", opts: ["jumped", "jumps", "jumping", "jump"] },
    { q: "I ___ an apple for lunch.", a: "ate", opts: ["ate", "eat", "eating", "eats"] },
    { q: "The sun is very ___ today.", a: "hot", opts: ["hot", "cold", "blue", "fast"] },
    { q: "She ___ reading a good book.", a: "is", opts: ["is", "are", "am", "be"] },
    { q: "___ you like to play football?", a: "Do", opts: ["Do", "Are", "Is", "Has"] }
  ]
};

let currentCategory = '';
let currentMode = '';
let score = 0;
let timeLeft = 0;
let timeTotal = 0;
let timerInterval;
let correctAnswer = null;
let testQuestionsData = []; 

const SECONDS_BLAST_START = 20; 
const BONUS_TIME = 5; 

const screens = {
  categoryScreen: document.getElementById('categoryScreen'),
  modeScreen: document.getElementById('modeScreen'),
  gameScreen: document.getElementById('gameScreen'),
  testScreen: document.getElementById('testScreen'),
  endScreen: document.getElementById('endScreen')
};

function switchScreen(screenName) {
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[screenName].classList.add('active');
  clearInterval(timerInterval);
  
  if(screenName === 'categoryScreen') {
    refreshTopBadges();
  }
}

function selectCategory(cat) {
  currentCategory = cat;
  switchScreen('modeScreen');
}

function startGame(mode) {
  currentMode = mode;
  score = 0;
  
  if (mode === 'test') {
    generateTest();
    switchScreen('testScreen');
    return;
  }

  document.getElementById('scoreDisplay').innerText = score;
  
  if (mode === 'relaxed') {
    document.getElementById('modeDisplay').innerHTML = '🌟 Practice';
    document.getElementById('timerBarWrap').style.display = 'none'; 
  } else {
    document.getElementById('modeDisplay').innerHTML = '🚀 Blast';
    document.getElementById('timerBarWrap').style.display = 'block';
    timeTotal = SECONDS_BLAST_START;
    timeLeft = SECONDS_BLAST_START;
    clearInterval(timerInterval);
    timerInterval = setInterval(countdown, 1000);
  }

  updateTimerUI();
  generateQuestion();
  switchScreen('gameScreen');
}

// ══════════════════════════════════════════════
// TEST MODE LOGIC
// ══════════════════════════════════════════════
function generateTest() {
  testQuestionsData = [];
  document.getElementById('submitTestBtn').style.display = 'block';
  document.getElementById('testResultArea').style.display = 'none';
  document.getElementById('testStickerAlert').classList.remove('show'); 
  
  let titleMap = { 'spelling': 'Spelling', 'phonics': 'Phonics', 'grammar': 'Grammar', 'sentences': 'Sentences' };
  document.getElementById('testTitle').innerText = titleMap[currentCategory] + " Test";
  
  const container = document.getElementById('testQuestionsContainer');
  container.innerHTML = '';

  let sourceData = [...WORD_DATA[currentCategory], ...WORD_DATA[currentCategory]].sort(() => Math.random() - 0.5).slice(0, 10);

  sourceData.forEach((item, i) => {
    let ans = item.a;
    testQuestionsData.push(ans);
    
    let shuffledOpts = [...item.opts].sort(() => Math.random() - 0.5);
    let optsHTML = shuffledOpts.map(o => `<option value="${o}">${o}</option>`).join('');

    let row = document.createElement('div');
    row.className = 'q-row';
    row.id = `qrow-${i}`;
    row.innerHTML = `
      <div class="q-word">
        <span style="font-size:1.2rem; color:#94a3b8; margin-right:10px;">${i + 1}.</span>
        ${item.q}
      </div>
      <div class="q-input-wrap">
        <select class="q-input" id="t-input-${i}">
          <option value="">Select...</option>
          ${optsHTML}
        </select>
        <span class="correction" id="corr-${i}">✓ ${ans}</span>
      </div>
    `;
    container.appendChild(row);
  });
}

function gradeTest() {
  let testScore = 0;
  
  testQuestionsData.forEach((ans, i) => {
    let inputEl = document.getElementById(`t-input-${i}`);
    let rowEl = document.getElementById(`qrow-${i}`);
    let userVal = inputEl.value;

    inputEl.disabled = true;

    if (userVal === ans) {
      rowEl.classList.add('correct');
      testScore++;
    } else {
      rowEl.classList.add('wrong');
    }
  });

  document.getElementById('submitTestBtn').style.display = 'none';
  document.getElementById('testResultArea').style.display = 'block';
  document.getElementById('testScoreDisplay').innerText = `${testScore}/10`;
  
  if (testScore === 10) {
    if(typeof playSound === 'function') playSound('win');
    document.getElementById('testResultMsg').innerText = "Perfect Score! Amazing! 🌟";
  } else if (testScore >= 7) {
    if(typeof playSound === 'function') playSound('correct');
    document.getElementById('testResultMsg').innerText = "Great job! Review your mistakes. 👍";
  } else {
    if(typeof playSound === 'function') playSound('wrong');
    document.getElementById('testResultMsg').innerText = "Keep practicing! Review your answers. 💪";
  }

  // STICKER CHECK
  if (testScore >= 8) {
    let newSticker = unlockSticker();
    if (newSticker) {
      document.getElementById('testUnlockedEmoji').innerText = newSticker;
      document.getElementById('testStickerAlert').classList.add('show');
    }
  }

  let currentXP = parseInt(localStorage.getItem('vedhTotalXP')) || 0;
  localStorage.setItem('vedhTotalXP', currentXP + (testScore * 2)); 
  window.scrollTo(0, 0);
}

// ══════════════════════════════════════════════
// GAMEPLAY LOGIC (Practice & Blast)
// ══════════════════════════════════════════════
function countdown() {
  timeLeft--;
  updateTimerUI();
  if (timeLeft <= 0) endGame();
}

function updateTimerUI() {
  if (currentMode === 'relaxed') return;
  let percentage = (timeLeft / timeTotal) * 100;
  if (percentage > 100) percentage = 100; if (percentage < 0) percentage = 0;
  document.getElementById('timerFill').style.width = percentage + '%';
}

function generateQuestion() {
  document.getElementById('problemArea').innerHTML = '';
  
  let dataSet = WORD_DATA[currentCategory];
  let item = dataSet[Math.floor(Math.random() * dataSet.length)];
  
  correctAnswer = item.a;

  let hint = "";
  if(currentCategory === 'spelling') hint = "Missing Letter!";
  if(currentCategory === 'phonics') hint = "Sound it out!";
  if(currentCategory === 'grammar') hint = "Word Rules!";
  if(currentCategory === 'sentences') hint = "Fill the blank!";

  document.getElementById('problemArea').innerHTML = `
    <div class="hint-text">${hint}</div>
    <div>${item.q}</div>
  `;
  
  renderOptions([...item.opts]);
}

function renderOptions(options) {
  options.sort(() => Math.random() - 0.5);
  let optsEl = document.getElementById('optionsContainer');
  optsEl.innerHTML = '';

  options.forEach(opt => {
    let btn = document.createElement('button');
    btn.className = 'opt-btn'; btn.innerText = opt;
    btn.onclick = () => checkAnswer(opt, btn);
    optsEl.appendChild(btn);
  });
}

function checkAnswer(selected, btn) {
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  if (selected === correctAnswer) {
     if(typeof playSound === 'function') playSound('correct');
    btn.classList.add('correct');
    score++;
    document.getElementById('scoreDisplay').innerText = score;
    
    let star = document.getElementById('fStar');
    star.style.left = btn.offsetLeft + (btn.offsetWidth/2) - 20 + 'px'; star.style.top = btn.offsetTop - 30 + 'px';
    star.classList.remove('pop'); void star.offsetWidth; star.classList.add('pop');
    
    if (currentMode === 'blast') {
      timeLeft += BONUS_TIME; if(timeLeft > timeTotal) timeTotal = timeLeft; 
      let plus = document.getElementById('timePlus');
      plus.classList.remove('show'); void plus.offsetWidth; plus.classList.add('show');
      updateTimerUI();
    }
    setTimeout(generateQuestion, 800);
  } else {
     if(typeof playSound === 'function') playSound('wrong');
    btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b => { if (b.innerText === correctAnswer) b.classList.add('correct'); });
    setTimeout(generateQuestion, 1500);
  }
}

function endGame() {
  if(typeof playSound === 'function') playSound('win');
  clearInterval(timerInterval);
  document.getElementById('finalScore').innerText = score;
  document.getElementById('gameStickerAlert').classList.remove('show'); 
  
  if (score >= 10) {
    let newSticker = unlockSticker();
    if (newSticker) {
      document.getElementById('gameUnlockedEmoji').innerText = newSticker;
      document.getElementById('gameStickerAlert').classList.add('show');
    }
  }

  let currentXP = parseInt(localStorage.getItem('vedhTotalXP')) || 0;
  localStorage.setItem('vedhTotalXP', currentXP + score);
  let msg = "Keep Practicing! 👍";
  if (score > 10) msg = "Great Job! 🌟";
  if (score > 20) msg = "Word Superstar! 🏆";
  document.getElementById('endMessage').innerText = msg;
  switchScreen('endScreen');
}

// Initialize badges on first load
refreshTopBadges();
</script>
