<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths Blast! 🚀 - Super Worksheets</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   WORKSHEET THEME - MATHS
══════════════════════════════════════════ */
:root {
  --primary: #22c55e; /* Green */
  --secondary: #3b82f6; /* Blue */
  --danger: #ef4444; 
  --warning: #fbbf24; 
  --dark: #1e293b; 
  --paper: #ffffff;
  --grid: #e2e8f0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background-color: #f8fafc;
  background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 30px 30px; color: var(--dark);
  min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
}

.home-btn {
  position: absolute; top: 20px; left: 20px; background: white; border: 3px solid var(--primary);
  color: var(--primary); padding: 8px 16px; border-radius: 50px; text-decoration: none;
  font-family: 'Fredoka One', cursive; font-size: 1.1rem; box-shadow: 0 4px 0 var(--primary); z-index: 100;
}
.home-btn:active { transform: translateY(4px); box-shadow: 0 0 0 var(--primary); }

header { text-align: center; margin-top: 40px; margin-bottom: 20px; }
h1 { font-family: 'Fredoka One', cursive; font-size: 3.2rem; color: var(--primary); text-shadow: 2px 2px 0 #fff; line-height: 1; }
.subtitle { font-size: 1.2rem; font-weight: 800; color: #64748b; margin-top: 5px; }

.screen { display: none; width: 100%; max-width: 600px; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.screen.active { display: block; }
@keyframes popIn { 0% { opacity: 0; transform: scale(0.9) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

.worksheet-card { background: var(--paper); border: 4px solid var(--dark); border-radius: 24px; padding: 30px; box-shadow: 0 10px 0 rgba(51, 65, 85, 0.1); text-align: center; position: relative; }

/* MINI BADGE BOARD */
.mini-badge-board { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; background: #f8fafc; border: 3px dashed #cbd5e1; border-radius: 16px; padding: 15px; }
.badge-board-title { width: 100%; font-family: 'Fredoka One'; font-size: 1.1rem; color: #94a3b8; margin-bottom: 5px; }
.mini-badge { font-size: 2.2rem; transition: all 0.3s ease; }
.mini-badge.unlocked { filter: drop-shadow(0 4px 4px rgba(0,0,0,0.15)); animation: popIn 0.3s ease; }
.mini-badge.locked { filter: grayscale(100%) contrast(0.2); opacity: 0.3; }

/* Category Grid */
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
.cat-btn {
  background: white; border: 4px solid var(--dark); border-radius: 16px; padding: 15px 10px;
  cursor: pointer; font-family: 'Fredoka One', cursive; font-size: 1.2rem; color: var(--dark);
  box-shadow: 0 6px 0 var(--dark); transition: all 0.1s; display: flex; flex-direction: column; align-items: center; gap: 5px;
}
.cat-btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--dark); }
.cat-icon { font-size: 2.5rem; }

/* Modes */
.mode-btn { width: 100%; display: flex; align-items: center; gap: 15px; background: white; border: 4px solid var(--dark); border-radius: 20px; padding: 15px 20px; margin-bottom: 15px; cursor: pointer; text-align: left; box-shadow: 0 6px 0 var(--dark); }
.mode-btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--dark); }

/* Game Area */
.top-bar { display: flex; justify-content: space-between; align-items: center; font-family: 'Fredoka One', cursive; font-size: 1.5rem; margin-bottom: 15px; color: var(--dark); }

.timer-container { width: 100%; height: 20px; background: #e2e8f0; border-radius: 20px; border: 3px solid var(--dark); overflow: hidden; margin-bottom: 20px; position: relative; }
.timer-fill { height: 100%; background: var(--primary); width: 100%; transition: width 0.3s linear, background-color 0.3s; }

/* Dynamic Problem Layout */
.math-problem { font-family: 'Fredoka One', cursive; font-size: 4rem; margin-bottom: 20px; color: var(--dark); display: flex; justify-content: center; align-items: center; gap: 15px; letter-spacing: 2px;}
.shape-emoji { font-size: 6rem; filter: drop-shadow(0 10px 0 rgba(0,0,0,0.1)); }

/* Options Grid */
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.opt-btn { font-family: 'Fredoka One', cursive; font-size: 2rem; background: white; border: 4px solid var(--dark); color: var(--dark); border-radius: 16px; padding: 15px 5px; cursor: pointer; box-shadow: 0 6px 0 var(--dark); transition: all 0.1s; }
.opt-btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--dark); }
.opt-btn.correct { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 6px 0 #16a34a; }
.opt-btn.wrong { background: var(--danger); color: white; border-color: var(--danger); box-shadow: 0 6px 0 #dc2626; }

.btn-primary { width: 100%; font-family: 'Fredoka One', cursive; font-size: 1.5rem; background: var(--secondary); color: white; border: 4px solid #2563eb; border-radius: 16px; padding: 15px; cursor: pointer; box-shadow: 0 6px 0 #2563eb; }
.btn-primary:active { transform: translateY(6px); box-shadow: 0 0 0 #2563eb; }

/* Feedback */
.feedback-star { position: absolute; font-size: 4rem; opacity: 0; pointer-events: none; z-index: 10; }
.feedback-star.pop { animation: starPop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
@keyframes starPop { 0% { opacity: 1; transform: scale(0.5) rotate(-20deg); } 50% { transform: scale(1.2) rotate(10deg); } 100% { opacity: 0; transform: scale(1) translateY(-30px); } }

.sticker-alert { background: #fef08a; border: 4px solid #ca8a04; border-radius: 16px; padding: 15px; margin-top: 20px; display: none; animation: popIn 0.5s ease; }
.sticker-alert.show { display: block; }
</style>
</head>
<body>

<a href="index.html" class="home-btn">🏠 Home</a>

<header>
  <h1>Maths Blast!</h1>
  <div class="subtitle">Learn & Practice 🚀</div>
</header>

<div id="categoryScreen" class="screen active">
  <div class="worksheet-card">
    <div class="mini-badge-board" id="miniBadgeBoard">
      <div class="badge-board-title">Collect all 12 Badges! 🏆</div>
      </div>

    <h2 style="font-family:'Fredoka One'; font-size: 1.8rem; color: var(--dark); margin-bottom: 15px;">What are we learning today?</h2>
    
    <a href="math-tales.html" style="text-decoration:none; display:block; margin-bottom: 15px;">
      <div class="cat-btn" style="border-color: #f43f5e; color: #f43f5e; box-shadow: 0 6px 0 #f43f5e; background: #fef2f2; flex-direction: row; justify-content: center; gap: 15px; padding: 20px; font-size: 1.5rem;">
        <span class="cat-icon">📖</span> Read Math Tales
      </div>
    </a>

    <div class="cat-grid">
      <button class="cat-btn" style="border-color: var(--primary); color: var(--primary);" onclick="selectCategory('add')">
        <span class="cat-icon">➕</span> Addition
      </button>
      <button class="cat-btn" style="border-color: var(--danger); color: var(--danger);" onclick="selectCategory('sub')">
        <span class="cat-icon">➖</span> Subtraction
      </button>
      <button class="cat-btn" style="border-color: var(--secondary); color: var(--secondary);" onclick="selectCategory('mul')">
        <span class="cat-icon">✖️</span> Multiplication
      </button>
      <button class="cat-btn" style="border-color: #a855f7; color: #a855f7;" onclick="selectCategory('div')">
        <span class="cat-icon">➗</span> Division
      </button>
      <button class="cat-btn" style="border-color: var(--warning); color: #d97706;" onclick="selectCategory('comp')">
        <span class="cat-icon">⚖️</span> Greater/Less
      </button>
      <button class="cat-btn" style="border-color: #ec4899; color: #ec4899;" onclick="selectCategory('shape')">
        <span class="cat-icon">🔺</span> Shapes
      </button>
    </div>
  </div>
</div>

<div id="modeScreen" class="screen">
  <div class="worksheet-card">
    <button style="background:none; border:none; color:#64748b; font-weight:bold; cursor:pointer; margin-bottom:15px; text-decoration:underline;" onclick="switchScreen('categoryScreen')">🔙 Back to Topics</button>
    <h2 style="font-family:'Fredoka One'; font-size: 1.8rem; margin-bottom: 20px; color: var(--dark);">Choose Your Mode</h2>
    
    <button class="mode-btn" style="border-color: var(--primary); box-shadow: 0 6px 0 var(--primary);" onclick="startGame('relaxed')">
      <div class="mode-icon" style="font-size: 2rem;">🌟</div>
      <div>
        <h3 style="font-family:'Fredoka One'; font-size: 1.4rem; color: var(--dark);">Practice Mode</h3>
        <p style="font-weight: 600; color: #64748b;">No timer! Take your time.</p>
      </div>
    </button>
    <button class="mode-btn" style="border-color: var(--warning); box-shadow: 0 6px 0 var(--warning);" onclick="startGame('blast')">
      <div class="mode-icon" style="font-size: 2rem;">🚀</div>
      <div>
        <h3 style="font-family:'Fredoka One'; font-size: 1.4rem; color: var(--dark);">Blast Mode</h3>
        <p style="font-weight: 600; color: #64748b;">Survival! Get +5s for correct answers.</p>
      </div>
    </button>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div class="worksheet-card" style="position:relative;">
    <div class="feedback-star" id="fStar">⭐</div>
    <div class="top-bar">
      <div>Score: <span id="scoreDisplay">0</span></div>
      <div id="modeDisplay" style="color: var(--warning);">🌟 Practice</div>
    </div>
    <div class="timer-container" id="timerBarWrap">
      <div class="timer-fill" id="timerFill"></div>
    </div>
    <div id="problemArea" class="math-problem"></div>
    <div class="options-grid" id="optionsContainer"></div>
  </div>
</div>

<div id="endScreen" class="screen">
  <div class="worksheet-card">
    <h2 style="font-family:'Fredoka One'; font-size: 2.5rem; color: var(--dark);" id="endTitle">Great Job!</h2>
    <div style="font-size: 5rem; margin: 10px 0; color: var(--secondary); font-family: 'Fredoka One'; line-height: 1;" id="finalScore">0</div>
    <div style="font-size: 1.2rem; font-weight: 800; color: #64748b; margin-bottom: 25px;" id="endMessage">Keep Practicing!</div>
    
    <div id="gameStickerAlert" class="sticker-alert">
      <h3 style="font-family:'Fredoka One'; color:#ca8a04; margin-bottom:5px;">🎉 NEW BADGE UNLOCKED!</h3>
      <div id="gameUnlockedEmoji" style="font-size: 4rem;"></div>
    </div>

    <button class="btn-primary" style="margin-top:20px;" onclick="switchScreen('categoryScreen')">Back to Menu 📚</button>
  </div>
</div>

<script src="sounds.js"></script>

<script>
const MATH_STICKERS = ['🪐', '🚀', '🛸', '👾', '🤖', '🦸‍♂️', '🦖', '🏎️', '🚒', '🚁', '⚡', '🏆'];

function getUnlockedStickers() { return parseInt(localStorage.getItem('vedhMathStickers')) || 0; }
function unlockSticker() {
  let current = getUnlockedStickers();
  if (current < MATH_STICKERS.length) {
    localStorage.setItem('vedhMathStickers', current + 1);
    if(typeof playSound === 'function') playSound('win');
    return MATH_STICKERS[current];
  }
  return null; 
}

function refreshTopBadges() {
  const container = document.getElementById('miniBadgeBoard');
  container.innerHTML = '<div class="badge-board-title">Collect all 12 Badges! 🏆</div>';
  let unlockedCount = getUnlockedStickers();
  MATH_STICKERS.forEach((sticker, i) => {
    let badge = document.createElement('div');
    badge.innerText = sticker;
    badge.className = i < unlockedCount ? 'mini-badge unlocked' : 'mini-badge locked';
    container.appendChild(badge);
  });
}

const screens = {
  categoryScreen: document.getElementById('categoryScreen'),
  modeScreen: document.getElementById('modeScreen'),
  gameScreen: document.getElementById('gameScreen'),
  endScreen: document.getElementById('endScreen')
};

function switchScreen(screenName) {
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[screenName].classList.add('active');
  clearInterval(timerInterval);
  if(screenName === 'categoryScreen') refreshTopBadges();
}

let currentCategory = '';
let currentMode = '';
let score = 0;
let timeLeft = 0;
let timeTotal = 0;
let timerInterval;
let correctAnswer = null;

const SECONDS_BLAST_START = 20; 
const BONUS_TIME = 5; 

const SHAPES = [
  { e: '🔺', n: 'Triangle' }, { e: '🟦', n: 'Square' },
  { e: '⏺️', n: 'Circle' }, { e: '⭐', n: 'Star' },
  { e: '❤️', n: 'Heart' }, { e: '♦️', n: 'Diamond' },
  { e: '🟩', n: 'Rectangle' }
];

function selectCategory(cat) {
  currentCategory = cat;
  switchScreen('modeScreen');
}

function startGame(mode) {
  currentMode = mode;
  score = 0;
  document.getElementById('scoreDisplay').innerText = score;
  
  if (mode === 'relaxed') {
    document.getElementById('modeDisplay').innerHTML = '🌟 Practice';
    document.getElementById('timerBarWrap').style.display = 'none'; 
  } else {
    document.getElementById('modeDisplay').innerHTML = '🚀 Blast';
    document.getElementById('timerBarWrap').style.display = 'block';
    timeTotal = SECONDS_BLAST_START;
    timeLeft = SECONDS_BLAST_START;
    clearInterval(timerInterval);
    timerInterval = setInterval(countdown, 1000);
  }

  updateTimerUI();
  generateQuestion();
  switchScreen('gameScreen');
}

function countdown() {
  timeLeft--;
  updateTimerUI();
  if (timeLeft <= 0) endGame();
}

function updateTimerUI() {
  if (currentMode === 'relaxed') return;
  let percentage = (timeLeft / timeTotal) * 100;
  if (percentage > 100) percentage = 100; if (percentage < 0) percentage = 0;
  document.getElementById('timerFill').style.width = percentage + '%';
}

function generateQuestion() {
  let maxNum = score < 5 ? 10 : (score < 15 ? 20 : 50);
  let qText = ''; let ans = ''; let opts = [];
  
  document.getElementById('problemArea').innerHTML = '';

  if (currentCategory === 'add' || currentCategory === 'sub') {
    let n1 = Math.floor(Math.random() * maxNum) + 1;
    let n2 = Math.floor(Math.random() * maxNum) + 1;
    let op = currentCategory === 'add' ? '+' : '-';
    if (currentCategory === 'sub' && n2 > n1) [n1, n2] = [n2, n1];
    ans = currentCategory === 'add' ? n1 + n2 : n1 - n2;
    qText = `${n1} ${op} ${n2} <span style="color:#94a3b8">=</span>`;
    opts = generateOptions(ans);
  } 
  else if (currentCategory === 'mul') {
    let mMax = score < 5 ? 5 : 10;
    let n1 = Math.floor(Math.random() * mMax) + 1;
    let n2 = Math.floor(Math.random() * 5) + 1;
    ans = n1 * n2;
    qText = `${n1} × ${n2} <span style="color:#94a3b8">=</span>`;
    opts = generateOptions(ans);
  }
  else if (currentCategory === 'div') {
    let a = Math.floor(Math.random() * 10) + 1;
    let n2 = Math.floor(Math.random() * 10) + 1;
    let n1 = a * n2;
    ans = a;
    qText = `${n1} ÷ ${n2} <span style="color:#94a3b8">=</span>`;
    opts = generateOptions(ans);
  }
  else if (currentCategory === 'comp') {
    let n1 = Math.floor(Math.random() * maxNum) + 1;
    let n2 = Math.floor(Math.random() * maxNum) + 1;
    if (Math.random() > 0.8) n2 = n1;
    if (n1 > n2) ans = '>'; else if (n1 < n2) ans = '<'; else ans = '=';
    qText = `${n1} <span style="color:#94a3b8">[ ? ]</span> ${n2}`;
    opts = ['>', '<', '='];
  }
  else if (currentCategory === 'shape') {
    let shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
    ans = shape.n;
    qText = `<div class="shape-emoji">${shape.e}</div>`;
    opts = [ans];
    while(opts.length < 4) {
      let rand = SHAPES[Math.floor(Math.random() * SHAPES.length)].n;
      if(!opts.includes(rand)) opts.push(rand);
    }
  }

  correctAnswer = ans;
  document.getElementById('problemArea').innerHTML = qText;
  
  if (currentCategory === 'comp') document.getElementById('optionsContainer').style.gridTemplateColumns = '1fr 1fr 1fr';
  else document.getElementById('optionsContainer').style.gridTemplateColumns = '1fr 1fr';
  
  renderOptions(opts);
}

function generateOptions(correct) {
  let opts = [correct];
  while(opts.length < 4) {
    let offset = Math.floor(Math.random() * 5) + 1;
    let wrong = Math.random() > 0.5 ? correct + offset : correct - offset;
    if(wrong >= 0 && !opts.includes(wrong)) opts.push(wrong);
  }
  return opts;
}

function renderOptions(options) {
  options.sort(() => Math.random() - 0.5);
  let optsEl = document.getElementById('optionsContainer');
  optsEl.innerHTML = '';
  options.forEach(opt => {
    let btn = document.createElement('button');
    btn.className = 'opt-btn'; btn.innerText = opt;
    btn.onclick = () => checkAnswer(opt, btn);
    optsEl.appendChild(btn);
  });
}

function checkAnswer(selected, btn) {
  document.querySelectorAll('#optionsContainer .opt-btn').forEach(b => b.disabled = true);
  if (selected === correctAnswer) {
    if(typeof playSound === 'function') playSound('correct');
    btn.classList.add('correct');
    score++;
    document.getElementById('scoreDisplay').innerText = score;
    
    let star = document.getElementById('fStar');
    star.style.left = btn.offsetLeft + (btn.offsetWidth/2) - 20 + 'px'; star.style.top = btn.offsetTop - 30 + 'px';
    star.classList.remove('pop'); void star.offsetWidth; star.classList.add('pop');
    
    if (currentMode === 'blast') {
      timeLeft += BONUS_TIME; if(timeLeft > timeTotal) timeTotal = timeLeft; 
      updateTimerUI();
    }
    setTimeout(generateQuestion, 800);
  } else {
    if(typeof playSound === 'function') playSound('wrong');
    btn.classList.add('wrong');
    document.querySelectorAll('#optionsContainer .opt-btn').forEach(b => { if (b.innerText == correctAnswer) b.classList.add('correct'); });
    setTimeout(generateQuestion, 1500);
  }
}

function endGame() {
  if(typeof playSound === 'function') playSound('win');
  clearInterval(timerInterval);
  document.getElementById('endTitle').innerText = "Time's Up!";
  document.getElementById('finalScore').innerText = score;
  document.getElementById('gameStickerAlert').classList.remove('show'); 
  
  if (score >= 10) {
    let newSticker = unlockSticker();
    if (newSticker) {
      document.getElementById('gameUnlockedEmoji').innerText = newSticker;
      document.getElementById('gameStickerAlert').classList.add('show');
    }
  }

  let currentXP = parseInt(localStorage.getItem('vedhTotalXP')) || 0;
  localStorage.setItem('vedhTotalXP', currentXP + score);
  let msg = "Keep Practicing! 👍";
  if (score > 10) msg = "Great Job! 🌟";
  if (score > 20) msg = "Math Superstar! 🏆";
  document.getElementById('endMessage').innerText = msg;
  switchScreen('endScreen');
}

refreshTopBadges();
</script>
</body>
</html>
