<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatar Shop 🛒 - Super Worksheets</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #a855f7; --secondary: #38bdf8; --gold: #fbbf24;
  --dark: #0f172a; --paper: #1e293b; --grid: #334155;
  --skin: #d4a373; /* Avatar Skin Tone */
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background-color: var(--dark);
  background-image: radial-gradient(var(--grid) 2px, transparent 2px);
  background-size: 30px 30px; color: white;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
}

.home-btn {
  position: absolute; top: 20px; left: 20px; background: var(--paper); border: 3px solid var(--primary);
  color: var(--primary); padding: 8px 16px; border-radius: 50px; text-decoration: none;
  font-family: 'Fredoka One', cursive; font-size: 1.1rem; box-shadow: 0 4px 0 var(--primary); z-index: 100;
}

header { text-align: center; margin-top: 50px; margin-bottom: 20px; }
h1 { font-family: 'Fredoka One', cursive; font-size: 2.8rem; color: var(--secondary); text-shadow: 0 4px 10px rgba(56,189,248,0.3); }

.bank-card {
  background: #fef08a; border: 4px solid #ca8a04; border-radius: 20px; padding: 10px 30px;
  margin-bottom: 25px; text-align: center; color: #854d0e; font-family: 'Fredoka One'; font-size: 1.5rem;
  box-shadow: 0 6px 0 #ca8a04; width: 100%; max-width: 400px;
}
.bank-card span { color: #b45309; font-size: 2.2rem; }

.shop-layout { display: flex; flex-direction: column; gap: 25px; width: 100%; max-width: 950px; }
@media (min-width: 768px) { .shop-layout { flex-direction: row; } }

/* ══════════════════════════════════════════
   NEW CSS AVATAR ENGINE
══════════════════════════════════════════ */
.avatar-preview-box {
  flex: 1; background: var(--paper); border: 4px solid #334155; border-radius: 24px;
  padding: 30px 20px; display: flex; flex-direction: column; align-items: center;
  justify-content: center; box-shadow: 0 10px 0 rgba(0,0,0,0.3); min-height: 400px; position: sticky; top: 20px;
}
.preview-title { font-family: 'Fredoka One'; color: var(--secondary); font-size: 1.5rem; margin-bottom: 30px; }

/* The Character Container */
.css-avatar-stage { position: relative; width: 160px; height: 200px; display: flex; justify-content: center; margin-bottom: 20px;}

/* Body Parts */
.css-head {
  position: absolute; width: 70px; height: 70px; background: var(--skin); border-radius: 50%;
  top: 10px; z-index: 3; box-shadow: inset -5px -5px 15px rgba(0,0,0,0.2); display: flex; justify-content: center; align-items: center;
}
.css-face { font-size: 1.5rem; margin-top: 10px; letter-spacing: 2px; }

.css-torso {
  position: absolute; width: 60px; height: 70px; background: #3b82f6; /* Default Blue Shirt */
  border-radius: 20px; top: 70px; z-index: 2; transition: background 0.3s;
  box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2);
}

.css-arm-l, .css-arm-r {
  position: absolute; width: 22px; height: 55px; background: #3b82f6; /* Default Blue Sleeves */
  border-radius: 12px; top: 75px; z-index: 1; transition: background 0.3s;
  box-shadow: inset -3px -3px 8px rgba(0,0,0,0.2);
}
.css-arm-l { left: 25px; transform: rotate(15deg); }
.css-arm-r { right: 25px; transform: rotate(-15deg); }

/* Hands */
.css-hand-l, .css-hand-r {
  position: absolute; width: 18px; height: 18px; background: var(--skin); border-radius: 50%;
  bottom: -5px; left: 2px;
}

.css-leg-l, .css-leg-r {
  position: absolute; width: 22px; height: 60px; background: #1e293b; border-radius: 10px;
  top: 130px; z-index: 1;
}
.css-leg-l { left: 52px; }
.css-leg-r { right: 52px; }

/* Item Sockets */
.slot-hat { position: absolute; top: -35px; font-size: 4.5rem; z-index: 5; text-shadow: 0 5px 10px rgba(0,0,0,0.4); }
.slot-sport { position: absolute; bottom: 0px; right: -30px; font-size: 4rem; z-index: 6; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.4)); }
.slot-drogo { position: absolute; bottom: 10px; left: -50px; font-size: 4rem; z-index: 4; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.4)); }

/* Animations */
@keyframes hoverFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
.css-avatar-stage.has-float-vehicle { animation: hoverFloat 1.5s infinite ease-in-out; }

@keyframes drogoWiggle { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg) translateY(-5px); } }
.slot-drogo { animation: drogoWiggle 2s infinite ease-in-out; }

/* ══════════════════════════════════════════
   SHOP UI
══════════════════════════════════════════ */
.shop-box { flex: 1.8; display: flex; flex-direction: column; }
.tabs { display: flex; gap: 8px; margin-bottom: 15px; }
.tab-btn { flex: 1; background: #334155; border: 3px solid #475569; border-radius: 12px; color: #94a3b8; font-family: 'Fredoka One'; padding: 10px 5px; cursor: pointer; font-size: 1rem; }
.tab-btn.active { background: var(--primary); border-color: #c084fc; color: white; }

.items-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-height: 60vh; overflow-y: auto; padding-right: 5px; padding-bottom: 20px;}
.items-grid::-webkit-scrollbar { width: 8px; }
.items-grid::-webkit-scrollbar-track { background: var(--dark); border-radius: 10px; }
.items-grid::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

.item-card { background: var(--paper); border: 3px solid #334155; border-radius: 16px; padding: 15px 10px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px; box-shadow: 0 6px 0 rgba(0,0,0,0.2); }
.item-emoji { font-size: 3rem; margin-bottom: 5px; }
.item-name { font-family: 'Fredoka One'; font-size: 1.1rem; }

.btn-shop { width: 100%; font-family: 'Fredoka One'; padding: 8px; border-radius: 10px; border: none; cursor: pointer; font-size: 1rem; margin-top: auto; transition: all 0.1s; }
.btn-buy  { background: var(--gold); color: #78350f; box-shadow: 0 4px 0 #d97706; }
.btn-buy:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
.btn-wear { background: var(--secondary); color: white; box-shadow: 0 4px 0 #0284c7; }
.btn-wear:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
.btn-active-equip { background: #10b981; color: white; border: 2px solid white; cursor: pointer; box-shadow: 0 4px 0 #047857; }
.btn-active-equip:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
</style>
</head>
<body>

<a href="index.html" class="home-btn">🔙 Home</a>

<header>
  <h1>Kingdom Custom Shop 🛒</h1>
  <div class="subtitle">Dress Vedh & Equip Items with Your XP!</div>
</header>

<div class="bank-card">
  Available Funds: <br><span id="shopXpDisplay">0</span> ⭐
</div>

<div class="shop-layout">
  
  <!-- CSS CHARACTER STAGE -->
  <div class="avatar-preview-box">
    <div class="preview-title">Vedh & Drogo 🌟</div>
    
    <div class="css-avatar-stage" id="avatarStage">
      <!-- Drogo Pet -->
      <div class="slot-drogo" id="viewDrogo">🥚</div>
      
      <!-- CSS Body -->
      <div class="css-head">
        <div class="slot-hat" id="viewHat"></div>
        <div class="css-face">👀<br>◡</div>
      </div>
      
      <div class="css-arm-l" id="cssArmL"><div class="css-hand-l"></div></div>
      <div class="css-torso" id="cssTorso"></div>
      <div class="css-arm-r" id="cssArmR"><div class="css-hand-r"></div></div>
      
      <div class="css-leg-l"></div>
      <div class="css-leg-r"></div>

      <!-- Item in Hand -->
      <div class="slot-sport" id="viewSport"></div>
    </div>
    
    <p style="font-weight: 800; color: #94a3b8; margin-top: 30px; font-size: 0.95rem;">Tap an "Equipped ✅" item to take it off!</p>
  </div>

  <div class="shop-box">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('hat', this)">Hats 👑</button>
      <button class="tab-btn" onclick="switchTab('suit', this)">Clothes 🥋</button>
      <button class="tab-btn" onclick="switchTab('sport', this)">Items 🚀</button>
    </div>
    <div class="items-grid" id="shopItemsContainer"></div>
  </div>

</div>

<script>
// --- SHOP REGISTRY WITH COLORS FOR CSS BODY ---
const ITEM_SHOP = [
  // Hats
  { id: "hat_cap", type: "hat", name: "Cool Cap", emoji: "🧢", cost: 20 },
  { id: "hat_crown", type: "hat", name: "Royal Crown", emoji: "👑", cost: 40 },
  { id: "hat_mask", type: "hat", name: "Hero Mask", emoji: "🎭", cost: 60 },
  { id: "hat_ninja", type: "hat", name: "Ninja Bandana", emoji: "🥷", cost: 80 },
  { id: "hat_pirate", type: "hat", name: "Pirate Hat", emoji: "🏴‍☠️", cost: 100 },
  { id: "hat_astronaut", type: "hat", name: "Space Helmet", emoji: "👨‍🚀", cost: 150 },
  { id: "hat_chef", type: "hat", name: "Master Chef Hat", emoji: "👨‍🍳", cost: 50 },
  { id: "hat_wizard", type: "hat", name: "Wizard Hat", emoji: "🧙", cost: 110 },
  { id: "hat_glowing", type: "hat", name: "Nebula Crown", emoji: "💫", cost: 800 },

  // Clothes (Added hex colors to dye the CSS shirt!)
  { id: "suit_gi", type: "suit", name: "Karate Gi", emoji: "🥋", cost: 45, color: "#f8fafc" },
  { id: "suit_wizard", type: "suit", name: "Wizard Robes", emoji: "🔮", cost: 50, color: "#9333ea" },
  { id: "suit_football", type: "suit", name: "Soccer Jersey", emoji: "🎽", cost: 35, color: "#ef4444" },
  { id: "suit_armor", type: "suit", name: "Knight Armor", emoji: "🛡️", cost: 100, color: "#94a3b8" },
  { id: "suit_hoodie", type: "suit", name: "Neon Hoodie", emoji: "🧥", cost: 150, color: "#10b981" },
  { id: "suit_suit", type: "suit", name: "Agent Suit", emoji: "👔", cost: 120, color: "#0f172a" },
  { id: "suit_cape", type: "suit", name: "Fire Cape", emoji: "💥", cost: 180, color: "#dc2626" },
  { id: "suit_king", type: "suit", name: "King Cloak", emoji: "🔱", cost: 300, color: "#b91c1c" },
  { id: "suit_gold", type: "suit", name: "Golden Armor", emoji: "✨", cost: 500, color: "#fbbf24" },
  { id: "suit_dragon", type: "suit", name: "Dragon Rider", emoji: "🐉", cost: 1200, color: "#047857" },

  // Items
  { id: "sport_ball", type: "sport", name: "Soccer Ball", emoji: "⚽", cost: 30 },
  { id: "sport_skate", type: "sport", name: "Skateboard", emoji: "🛹", cost: 70 },
  { id: "sport_sword", type: "sport", name: "Laser Sword", emoji: "⚔️", cost: 120 },
  { id: "sport_hover", type: "sport", name: "Hoverboard", emoji: "🛸", cost: 200 }, 
  { id: "sport_carpet", type: "sport", name: "Magic Carpet", emoji: "🧹", cost: 280 }, 
  { id: "sport_wings", type: "sport", name: "Jetpack Wings", emoji: "🎒", cost: 400 }, 
  { id: "sport_ufo", type: "sport", name: "Mini Alien UFO", emoji: "👽", cost: 600 },
  { id: "sport_teleport", type: "sport", name: "Teleporter", emoji: "🌀", cost: 2000 },
  { id: "sport_galaxy", type: "sport", name: "Galaxy Engine", emoji: "🌌", cost: 5000 }
];

const FLOATING_VEHICLES = ["sport_hover", "sport_carpet", "sport_wings", "sport_ufo", "sport_teleport", "sport_galaxy"];
const DROGO_EMOJIS = ["🥚", "🦎", "🦕", "🐉", "🐲", "🐲🛡️", "🐲👑", "🐲🌌"];

let bankXP = parseInt(localStorage.getItem('vedhTotalXP')) || 0;
let drogoLevel = parseInt(localStorage.getItem('vedhDrogoLevel')) || 1;
let ownedItems = JSON.parse(localStorage.getItem('vedhOwnedItems')) || [];
let equippedItems = JSON.parse(localStorage.getItem('vedhEquippedItems')) || { hat: "", suit: "", sport: "" };

let currentTab = "hat";

function initShop() {
  renderAvatarPreview();
  renderShopGrid();
}

function renderAvatarPreview() {
  document.getElementById('shopXpDisplay').innerText = bankXP;
  
  // Drogo Logic
  let dIndex = drogoLevel - 1;
  if (dIndex >= DROGO_EMOJIS.length) dIndex = DROGO_EMOJIS.length - 1;
  document.getElementById('viewDrogo').innerText = DROGO_EMOJIS[dIndex];

  // Hat & Item Sockets
  const layers = {
    hat: document.getElementById('viewHat'),
    sport: document.getElementById('viewSport')
  };

  Object.keys(layers).forEach(type => {
    let activeId = equippedItems[type];
    let matchedItem = ITEM_SHOP.find(i => i.id === activeId);
    if (matchedItem) {
      layers[type].innerText = matchedItem.emoji;
      layers[type].style.display = "block";
    } else {
      layers[type].innerText = "";
      layers[type].style.display = "none";
    }
  });

  // Torso Color Logic (Dyes the CSS shapes!)
  let activeSuit = ITEM_SHOP.find(i => i.id === equippedItems.suit);
  let shirtColor = activeSuit ? activeSuit.color : "#3b82f6"; // Default Blue
  document.getElementById('cssTorso').style.background = shirtColor;
  document.getElementById('cssArmL').style.background = shirtColor;
  document.getElementById('cssArmR').style.background = shirtColor;

  // Floating Animation
  let stage = document.getElementById('avatarStage');
  if (FLOATING_VEHICLES.includes(equippedItems.sport)) {
    stage.classList.add('has-float-vehicle');
  } else {
    stage.classList.remove('has-float-vehicle');
  }
}

function switchTab(tabType, buttonEl) {
  currentTab = tabType;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  buttonEl.classList.add('active');
  renderShopGrid();
}

function renderShopGrid() {
  const container = document.getElementById('shopItemsContainer');
  container.innerHTML = '';

  let filteredItems = ITEM_SHOP.filter(item => item.type === currentTab);

  filteredItems.forEach(item => {
    let card = document.createElement('div');
    card.className = 'item-card';
    
    let isOwned = ownedItems.includes(item.id);
    let isEquipped = equippedItems[item.type] === item.id;
    let actionButtonHTML = '';

    if (isEquipped) {
      actionButtonHTML = `<button class="btn-shop btn-active-equip" onclick="toggleEquip('${item.id}')">Equipped ✅</button>`;
      card.style.borderColor = 'var(--secondary)';
    } else if (isOwned) {
      actionButtonHTML = `<button class="btn-shop btn-wear" onclick="toggleEquip('${item.id}')">Wear Item</button>`;
      card.style.borderColor = 'var(--primary)';
    } else {
      let canAfford = bankXP >= item.cost;
      actionButtonHTML = `<button class="btn-shop btn-buy" ${canAfford ? '' : 'disabled style="opacity:0.5; background:#64748b; box-shadow:none; color:#cbd5e1;"'} onclick="buyItem('${item.id}', ${item.cost})">Buy: ${item.cost} XP</button>`;
      card.style.borderColor = '#334155';
    }

    card.innerHTML = `<div class="item-emoji">${item.emoji}</div><div class="item-name">${item.name}</div>${actionButtonHTML}`;
    container.appendChild(card);
  });
}

function buyItem(id, cost) {
  if (bankXP < cost) return;
  bankXP -= cost;
  ownedItems.push(id);
  localStorage.setItem('vedhTotalXP', bankXP);
  localStorage.setItem('vedhOwnedItems', JSON.stringify(ownedItems));
  initShop();
}

function toggleEquip(id) {
  let item = ITEM_SHOP.find(i => i.id === id);
  if (!item) return;
  
  // Toggle off if already wearing it
  if (equippedItems[item.type] === id) {
    equippedItems[item.type] = "";
  } else {
    equippedItems[item.type] = id;
  }

  localStorage.setItem('vedhEquippedItems', JSON.stringify(equippedItems));
  initShop();
}

initShop();
</script>
</body>
</html>
